version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: medichain_postgres
    restart: always
    environment:
      POSTGRES_USER: medichain
      POSTGRES_PASSWORD: medichain
      POSTGRES_DB: medichain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: medichain_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: